<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(120deg, #00bcd4, #4caf50);
            font-family: Arial, sans-serif;
            color: white;
        }
        h1 {
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <h1 id="message">Blocked</h1>
    <script>
        const name = new URLSearchParams(window.location.search).get('name');
        if (name) {
            document.getElementById('message').textContent = 'Blocked: ' + name;
        }
    </script>
</body>
</html>
